<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Organizer CLI — Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    color: #e2e8f0;
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .subtitle {
    color: #4a5568;
    font-size: 13px;
    margin-bottom: 1.5rem;
    font-family: 'Courier New', monospace;
  }

  .desktop {
    width: 700px;
    background: #161b27;
    border-radius: 10px;
    border: 1px solid #2a3040;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .titlebar {
    background: #111520;
    height: 32px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    border-bottom: 1px solid #2a3040;
    user-select: none;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .titlebar-label {
    font-size: 12px;
    color: #6b7a99;
    margin: 0 auto;
    font-family: 'Courier New', monospace;
  }

  .split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 260px;
    transition: grid-template-columns 0.5s ease;
  }
  .split.full { grid-template-columns: 1fr 0fr; }

  .explorer {
    background: #161b27;
    border-right: 1px solid #2a3040;
    padding: 14px;
    overflow: hidden;
  }
  .explorer-path {
    font-size: 10px;
    color: #4a5568;
    font-family: 'Courier New', monospace;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1e2535;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 7px;
    border-radius: 5px;
    font-size: 12.5px;
    font-family: 'Courier New', monospace;
    color: #9ba8c0;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .file-item.gone { opacity: 0; transform: translateX(18px); }

  .folder-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 14px;
  }
  .folder-card {
    background: #1e2535;
    border: 1px solid #2d3650;
    border-radius: 7px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Courier New', monospace;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .folder-card.show { opacity: 1; transform: translateY(0); }
  .folder-name { font-size: 12px; font-weight: 600; color: #f6ad55; }
  .folder-count { font-size: 10px; color: #4a5568; margin-top: 2px; }
  .folder-icon { font-size: 22px; }

  .terminal {
    background: #0d1117;
    padding: 14px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    overflow-y: auto;
    display: none;
    max-height: 260px;
  }
  .t-line { display: block; line-height: 1.75; opacity: 0; transition: opacity 0.15s; }
  .t-line.show { opacity: 1; }
  .t-green { color: #4ade80; }
  .t-blue  { color: #60a5fa; }
  .t-amber { color: #fbbf24; }
  .t-gray  { color: #475569; }
  .t-white { color: #e2e8f0; }
  .t-dim   { color: #334155; }
  .cursor  { display: inline-block; width: 7px; height: 13px; background: #4ade80; animation: blink 1s step-end infinite; vertical-align: -2px; margin-left: 1px; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

  .scene-badge {
    display: inline-block;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    color: #4ade80;
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 10px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 1.25rem;
    width: 700px;
  }
  .play-btn {
    background: transparent;
    border: 1px solid #2a3040;
    color: #e2e8f0;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .play-btn:hover { background: #1e2535; }
  .play-btn:disabled { opacity: 0.5; cursor: default; }
  .bar-wrap { flex: 1; height: 4px; background: #1e2535; border-radius: 2px; overflow: hidden; }
  .bar { height: 100%; width: 0%; background: #4ade80; border-radius: 2px; transition: width 0.08s linear; }
  .time { font-size: 11px; color: #4a5568; font-family: 'Courier New', monospace; min-width: 32px; text-align: right; }

  #scene-label {
    font-size: 12px;
    color: #6b7a99;
    font-family: 'Courier New', monospace;
    margin-bottom: 0.75rem;
    min-height: 18px;
  }
</style>
</head>
<body>

<h1>🗂️ File Organizer CLI</h1>
<p class="subtitle">python file_organizer.py --folder "C:\Users\pasan\Downloads"</p>

<div id="scene-label">Scene 1 — messy Downloads folder</div>

<div class="desktop">
  <div class="titlebar" id="titlebar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#febc2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span class="titlebar-label" id="title-text">📁 Downloads — File Explorer</span>
  </div>

  <div class="split" id="split">
    <div class="explorer" id="explorer">
      <div class="explorer-path" id="explorer-path">C:\Users\pasan\Downloads</div>
      <div id="file-list">
        <div class="file-item" id="f1">🖼️&nbsp; photo.jpg</div>
        <div class="file-item" id="f2">📄&nbsp; report.pdf</div>
        <div class="file-item" id="f3">🎵&nbsp; song.mp3</div>
        <div class="file-item" id="f4">🎬&nbsp; video.mp4</div>
        <div class="file-item" id="f5">🖼️&nbsp; screenshot.png</div>
        <div class="file-item" id="f6">📝&nbsp; notes.docx</div>
      </div>
    </div>
    <div class="terminal" id="terminal"></div>
  </div>
</div>

<div class="controls">
  <button class="play-btn" id="play-btn" onclick="startDemo()">▶ Play demo</button>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <span class="time" id="time">0:00</span>
</div>

<script>
const TOTAL = 9500;
let t0, raf, running = false;
const fired = new Set();

const steps = [
  { at: 900,  fn: () => {
    setScene('Scene 2 — running the CLI tool', '⚡ Terminal — file_organizer.py');
    document.getElementById('terminal').style.display = 'block';
  }},
  { at: 1100, fn: () => addLine('t-green', 'pasan@dev ~/projects/file-organizer') },
  { at: 1300, fn: () => addLine('t-white', '$ python file_organizer.py --folder "C:\\Users\\pasan\\Downloads"', true) },
  { at: 2100, fn: () => addLine('t-dim', '') },
  { at: 2200, fn: () => addLine('t-amber', '[2026-06-10 14:22:01] Starting file organizer...') },
  { at: 2500, fn: () => addLine('t-gray',  '[14:22:01] Scanning: C:\\Users\\pasan\\Downloads') },
  { at: 2800, fn: () => addLine('t-gray',  '[14:22:01] Found 6 file(s) to organize') },
  { at: 3000, fn: () => addLine('t-dim', '') },
  { at: 3100, fn: () => { setScene('Scene 3 — organizing files in real time', '⚡ Terminal — running'); addLine('t-green', '[14:22:02] ✓ Created folder → images/') }},
  { at: 3400, fn: () => addLine('t-green', '[14:22:02] ✓ Created folder → documents/') },
  { at: 3700, fn: () => addLine('t-green', '[14:22:02] ✓ Created folder → audio/') },
  { at: 3950, fn: () => addLine('t-green', '[14:22:02] ✓ Created folder → videos/') },
  { at: 4100, fn: () => addLine('t-dim', '') },
  { at: 4200, fn: () => { addLine('t-gray', '[14:22:03] Moving photo.jpg        → images/');     move('f1'); }},
  { at: 4480, fn: () => { addLine('t-gray', '[14:22:03] Moving screenshot.png   → images/');     move('f5'); }},
  { at: 4750, fn: () => { addLine('t-gray', '[14:22:03] Moving report.pdf       → documents/');  move('f2'); }},
  { at: 5000, fn: () => { addLine('t-gray', '[14:22:03] Moving notes.docx       → documents/');  move('f6'); }},
  { at: 5280, fn: () => { addLine('t-gray', '[14:22:04] Moving song.mp3         → audio/');      move('f3'); }},
  { at: 5550, fn: () => { addLine('t-gray', '[14:22:04] Moving video.mp4        → videos/');     move('f4'); }},
  { at: 5800, fn: () => addLine('t-dim', '') },
  { at: 5900, fn: () => addLine('t-green', '[14:22:04] ✓ Done! 6 files organized into 4 folders.') },
  { at: 6150, fn: () => addLine('t-amber', '[14:22:04] Log saved → logs/organizer_log.txt') },
  { at: 6600, fn: () => showScene4() },
];

function addLine(cls, text, cursor = false) {
  const term = document.getElementById('terminal');
  const span = document.createElement('span');
  span.className = 't-line show ' + cls;
  span.textContent = text;
  if (cursor) { const c = document.createElement('span'); c.className = 'cursor'; span.appendChild(c); }
  term.appendChild(span);
  term.appendChild(document.createTextNode('\n'));
  term.scrollTop = 9999;
}

function move(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('gone');
}

function setScene(label, title) {
  document.getElementById('scene-label').textContent = label;
  document.getElementById('title-text').textContent = title;
}

function showScene4() {
  setScene('Scene 4 — Downloads folder, neatly organized', '📁 Downloads — organized');
  document.getElementById('terminal').style.display = 'none';
  document.getElementById('split').style.gridTemplateColumns = '1fr';
  document.getElementById('explorer-path').textContent = 'C:\\Users\\pasan\\Downloads  (4 folders)';
  document.getElementById('file-list').innerHTML = `
    <div class="folder-grid">
      <div class="folder-card" id="fc1"><span class="folder-icon">🖼️</span><div><div class="folder-name">images/</div><div class="folder-count">2 files</div></div></div>
      <div class="folder-card" id="fc2"><span class="folder-icon">📄</span><div><div class="folder-name">documents/</div><div class="folder-count">2 files</div></div></div>
      <div class="folder-card" id="fc3"><span class="folder-icon">🎵</span><div><div class="folder-name">audio/</div><div class="folder-count">1 file</div></div></div>
      <div class="folder-card" id="fc4"><span class="folder-icon">🎬</span><div><div class="folder-name">videos/</div><div class="folder-count">1 file</div></div></div>
    </div>`;
  setTimeout(() => { document.getElementById('fc1')?.classList.add('show'); document.getElementById('fc2')?.classList.add('show'); }, 200);
  setTimeout(() => { document.getElementById('fc3')?.classList.add('show'); document.getElementById('fc4')?.classList.add('show'); }, 550);
}

function startDemo() {
  if (running) return;
  running = true;
  fired.clear();
  document.getElementById('play-btn').textContent = '⏳ Playing…';
  document.getElementById('play-btn').disabled = true;
  t0 = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(now) {
  const el = now - t0;
  document.getElementById('bar').style.width = Math.min(100, (el / TOTAL) * 100) + '%';
  const s = Math.floor(el / 1000);
  document.getElementById('time').textContent = '0:0' + Math.min(9, s);

  steps.forEach(step => {
    if (el >= step.at && !fired.has(step.at)) { fired.add(step.at); step.fn(); }
  });

  if (el < TOTAL) { raf = requestAnimationFrame(tick); }
  else {
    running = false;
    document.getElementById('play-btn').textContent = '↺ Replay';
    document.getElementById('play-btn').disabled = false;
    document.getElementById('play-btn').onclick = replayDemo;
  }
}

function replayDemo() {
  fired.clear();
  running = false;
  document.getElementById('bar').style.width = '0%';
  document.getElementById('time').textContent = '0:00';
  document.getElementById('scene-label').textContent = 'Scene 1 — messy Downloads folder';
  document.getElementById('title-text').textContent = '📁 Downloads — File Explorer';
  document.getElementById('terminal').innerHTML = '';
  document.getElementById('terminal').style.display = 'none';
  document.getElementById('split').style.gridTemplateColumns = '1fr 1fr';
  document.getElementById('explorer-path').textContent = 'C:\\Users\\pasan\\Downloads';
  document.getElementById('file-list').innerHTML = `
    <div class="file-item" id="f1">🖼️&nbsp; photo.jpg</div>
    <div class="file-item" id="f2">📄&nbsp; report.pdf</div>
    <div class="file-item" id="f3">🎵&nbsp; song.mp3</div>
    <div class="file-item" id="f4">🎬&nbsp; video.mp4</div>
    <div class="file-item" id="f5">🖼️&nbsp; screenshot.png</div>
    <div class="file-item" id="f6">📝&nbsp; notes.docx</div>`;
  document.getElementById('play-btn').textContent = '▶ Play demo';
  document.getElementById('play-btn').onclick = startDemo;
  startDemo();
}
</script>
</body>
</html>
